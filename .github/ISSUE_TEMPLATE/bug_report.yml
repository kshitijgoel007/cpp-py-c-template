name: Bug report
description: Report a reproducible defect
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform and architecture
    validations:
      required: true
  - type: input
    id: toolchain
    attributes:
      label: Compiler, CMake, and Python versions
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Expected and actual behavior
    validations:
      required: true

