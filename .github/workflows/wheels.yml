name: Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wheels:
    name: Wheel / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install cibuildwheel
        run: pip install cibuildwheel
      - name: Build repaired wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # Ensure a recent cmake is available inside manylinux containers.
          CIBW_BEFORE_BUILD_LINUX: "pip install cmake>=3.24"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ runner.os }}
          path: wheelhouse/*.whl
